name: files-downloader

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: files_db
      POSTGRES_USER: files
      POSTGRES_PASSWORD: files
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U files -d files_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://files:files@db:5432/files_db
      FILES_STORAGE_DIR: /app/data/files
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088,http://127.0.0.1:8088}
    volumes:
      - files_data:/app/data/files
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${APP_HOST_PORT:-8088}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  files_data:
